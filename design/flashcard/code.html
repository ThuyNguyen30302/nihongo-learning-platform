<!DOCTYPE html>

                        "on-tertiary-container": "#004556",
                        "on-surface-variant": "#564338",

                        "secondary-fixed": "#bdf1a3",

                        "surface-dim": "#ead6cd",
                        "on-secondary-fixed-variant": "#255015",

                    "fontFamily": {
                        "display-lg": ["Be Vietnam Pro"],

<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="bg-surface dark:bg-background docked full-width top-0 w-full z-50">
<div class="flex justify-between items-center w-full px-container-margin py-base max-w-[1100px] mx-auto">
<div class="font-display-lg text-display-lg font-bold text-primary dark:text-primary-fixed-dim">
                Carrot
            </div>
<nav class="hidden md:flex gap-stack-md font-headline-md text-headline-md font-body-md text-body-md">
<a class="text-on-surface-variant dark:text-outline-variant hover:text-primary dark:hover:text-primary-fixed-dim transition-colors duration-200" href="#">Home</a>
<a class="text-on-surface-variant dark:text-outline-variant hover:text-primary dark:hover:text-primary-fixed-dim transition-colors duration-200" href="#">Dictionary</a>
<a class="text-on-surface-variant dark:text-outline-variant hover:text-primary dark:hover:text-primary-fixed-dim transition-colors duration-200" href="#">Favorites</a>
<a class="text-primary dark:text-primary-fixed-dim border-b-2 border-primary dark:border-primary-fixed-dim pb-1 font-bold opacity-80 scale-95 transition-all" href="#">Flashcards</a>
</nav>
<div class="flex items-center gap-base">
<button class="text-primary dark:text-primary-fixed-dim hover:bg-surface-variant rounded-full p-2 transition-colors">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">search</span>
</button>
<button class="text-primary dark:text-primary-fixed-dim hover:bg-surface-variant rounded-full p-2 transition-colors">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">account_circle</span>
</button>
</div>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col items-center justify-start w-full px-container-margin py-stack-lg max-w-[1100px] mx-auto pb-32">
<!-- Progress Indicator -->
<div class="w-full max-w-md mb-stack-lg">
<div class="flex justify-between items-center mb-2 font-label-md text-label-md text-on-surface-variant">
<span>Session Progress</span>
<span class="font-bold text-primary">15 / 40 cards</span>
</div>
<div class="w-full h-1 bg-surface-container-high rounded-full overflow-hidden">
<div class="h-full bg-secondary-fixed-dim rounded-full" style="width: 37.5%;"></div>
</div>
</div>
<!-- Flashcard Area -->
<div class="w-full max-w-md aspect-[3/4] perspective-1000 relative mb-stack-lg cursor-pointer group">
<!-- Card Front -->
<div class="w-full h-full bg-surface-container-lowest border border-outline-variant rounded-xl shadow-[0px_4px_20px_rgba(0,0,0,0.05)] flex flex-col items-center justify-center p-stack-md relative transition-transform duration-500 transform-style-3d backface-hidden group-hover:shadow-[0px_8px_30px_rgba(255,140,66,0.15)]">
<!-- Hint/Context Tag -->
<div class="absolute top-stack-md left-stack-md">
<span class="bg-surface-variant text-on-surface-variant font-label-sm text-label-sm px-2 py-1 rounded">N4 Vocab</span>
</div>
<!-- Main Content -->
<div class="text-center flex flex-col items-center justify-center space-y-stack-sm">
<!-- Furigana Placeholder (invisible until flip or contextually needed, but structured here for UI balance) -->
<div class="font-body-lg text-body-lg text-on-surface-variant opacity-0 h-7">
                        がくせい
                    </div>
<!-- Primary Kanji/Kana -->
<div class="font-display-lg text-display-lg text-on-surface">
                        学生
                    </div>
</div>
<!-- Instruction -->
<div class="absolute bottom-stack-md w-full text-center">
<span class="font-label-md text-label-md text-outline flex items-center justify-center gap-1">
<span class="material-symbols-outlined text-[16px]">flip</span>
                        Tap to flip
                    </span>
</div>
</div>
</div>
<!-- Interaction Buttons (Feedback) -->
<div class="w-full max-w-md grid grid-cols-4 gap-gutter">
<!-- Lặp lại (Again) -->
<button class="flex flex-col items-center justify-center gap-1 bg-surface-container border border-outline-variant hover:border-primary hover:bg-surface-container-low rounded-lg p-2 transition-all">
<span class="font-label-md text-label-md text-error">Lặp lại</span>
<span class="font-label-sm text-label-sm text-on-surface-variant">1 min</span>
</button>
<!-- Khó (Hard) -->
<button class="flex flex-col items-center justify-center gap-1 bg-surface-container border border-outline-variant hover:border-primary hover:bg-surface-container-low rounded-lg p-2 transition-all">
<span class="font-label-md text-label-md text-primary">Khó</span>
<span class="font-label-sm text-label-sm text-on-surface-variant">6 min</span>
</button>
<!-- Tốt (Good) -->
<button class="flex flex-col items-center justify-center gap-1 bg-surface-container border border-outline-variant hover:border-primary hover:bg-surface-container-low rounded-lg p-2 transition-all">
<span class="font-label-md text-label-md text-secondary">Tốt</span>
<span class="font-label-sm text-label-sm text-on-surface-variant">10 min</span>
</button>
<!-- Dễ (Easy) -->
<button class="flex flex-col items-center justify-center gap-1 bg-surface-container border border-outline-variant hover:border-primary hover:bg-surface-container-low rounded-lg p-2 transition-all">
<span class="font-label-md text-label-md text-tertiary">Dễ</span>
<span class="font-label-sm text-label-sm text-on-surface-variant">4 days</span>
</button>
</div>
</main>
<!-- BottomNavBar (Mobile Only) -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 py-2 bg-surface-container dark:bg-surface-container-high md:hidden docked full-width bottom-0 z-50 rounded-t-xl shadow-[0px_-4px_20px_rgba(0,0,0,0.05)]">
<a class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline-variant hover:bg-primary-fixed-dim/20 transition-all rounded-lg p-1" href="#">
<span class="material-symbols-outlined">home</span>
<span class="font-label-sm text-label-sm">Home</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline-variant hover:bg-primary-fixed-dim/20 transition-all rounded-lg p-1" href="#">
<span class="material-symbols-outlined">menu_book</span>
<span class="font-label-sm text-label-sm">Dictionary</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline-variant hover:bg-primary-fixed-dim/20 transition-all rounded-lg p-1" href="#">
<span class="material-symbols-outlined">favorite</span>
<span class="font-label-sm text-label-sm">Favorites</span>
</a>
<a class="flex flex-col items-center justify-center bg-primary-container dark:bg-primary text-on-primary-container dark:text-on-primary rounded-full px-4 py-1 hover:bg-primary-fixed-dim/20 transition-all scale-95 duration-150" href="#">
<span class="material-symbols-outlined">style</span>
<span class="font-label-sm text-label-sm">Flashcards</span>
</a>
</nav>
</body></html>
